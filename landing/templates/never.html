<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Я никогда не… — Игра</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Manrope','Inter',system-ui,sans-serif;
  min-height:100dvh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:#0d0d1a;color:#e8e8f0;
  padding:20px;
  user-select:none;
  overflow:hidden;
}
.container{
  max-width:480px;width:100%;text-align:center;
  display:flex;flex-direction:column;align-items:center;gap:24px;
}
h1{
  font-size:1.6rem;font-weight:800;
  background:linear-gradient(135deg,#f7c948,#ee5a24);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.card{
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.1);
  border-radius:20px;
  padding:40px 28px;
  min-height:200px;
  width:100%;
  display:flex;align-items:center;justify-content:center;
  position:relative;
  transition:transform .3s,opacity .3s;
}
.card.exit-left{transform:translateX(-120%) rotate(-8deg);opacity:0}
.card.exit-right{transform:translateX(120%) rotate(8deg);opacity:0}
.card.enter{animation:cardIn .35s ease-out}
@keyframes cardIn{
  from{transform:scale(.9) translateY(30px);opacity:0}
  to{transform:scale(1) translateY(0);opacity:1}
}
.card-text{font-size:1.35rem;font-weight:600;line-height:1.5}
.category{
  position:absolute;top:12px;right:16px;
  font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;
  color:rgba(255,255,255,.35);
}
.counter{font-size:.8rem;color:rgba(255,255,255,.3)}
.buttons{display:flex;gap:14px;width:100%}
.btn{
  flex:1;padding:14px;border:none;border-radius:14px;
  font-size:1rem;font-weight:700;cursor:pointer;
  transition:transform .15s,box-shadow .15s;
}
.btn:active{transform:scale(.95)}
.btn-yes{
  background:linear-gradient(135deg,#27ae60,#2ecc71);color:#fff;
  box-shadow:0 4px 20px rgba(46,204,113,.3);
}
.btn-no{
  background:linear-gradient(135deg,#e74c3c,#c0392b);color:#fff;
  box-shadow:0 4px 20px rgba(231,76,60,.3);
}
.btn-next{
  background:linear-gradient(135deg,#3498db,#2980b9);color:#fff;
  box-shadow:0 4px 20px rgba(52,152,219,.3);
}
.settings{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.chip{
  padding:6px 14px;border-radius:20px;
  font-size:.75rem;font-weight:600;cursor:pointer;
  border:1px solid rgba(255,255,255,.15);
  background:rgba(255,255,255,.05);
  color:rgba(255,255,255,.5);
  transition:all .2s;
}
.chip.active{border-color:#f7c948;color:#f7c948;background:rgba(247,201,72,.1)}
.score-bar{display:flex;gap:20px;font-size:.85rem;font-weight:600}
.score-bar span{opacity:.6}
.score-yes{color:#2ecc71}
.score-no{color:#e74c3c}
.footer{margin-top:12px;font-size:.65rem;color:rgba(255,255,255,.15)}
.footer a{color:rgba(255,255,255,.25);text-decoration:none}
</style>
</head>
<body>
<div class="container">
  <h1>🍷 Я никогда не…</h1>
  <div class="settings" id="filters"></div>
  <div class="score-bar">
    <span class="score-yes">Делал: <b id="sYes">0</b></span>
    <span class="score-no">Не делал: <b id="sNo">0</b></span>
  </div>
  <div class="card" id="card">
    <div class="category" id="cat"></div>
    <div class="card-text" id="text">Нажми «Дальше» чтобы начать!</div>
  </div>
  <div class="counter" id="counter"></div>
  <div class="buttons">
    <button class="btn btn-yes" id="bYes" style="display:none" onclick="answer('yes')">✋ Делал</button>
    <button class="btn btn-no" id="bNo" style="display:none" onclick="answer('no')">😇 Не делал</button>
    <button class="btn btn-next" id="bNext" onclick="next()">Дальше →</button>
  </div>
  <div class="footer"><a href="/">RadarShield</a></div>
</div>

{t:"притворялся, что кончил(а)",c:"18+"},
{t:"трахался с соседом/соседкой",c:"18+"},

const cats=[...new Set(Q.map(q=>q.c))];
const active=new Set(cats);
let deck=[],idx=0,sY=0,sN=0,started=false;
const $f=document.getElementById('filters');
cats.forEach(c=>{
  const d=document.createElement('div');
  d.className='chip active';d.textContent=c;
  d.onclick=()=>{
    if(active.has(c)){if(active.size===1)return;active.delete(c);d.classList.remove('active')}
    else{active.add(c);d.classList.add('active')}
  };
  $f.appendChild(d);
});
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function deal(){deck=shuffle(Q.filter(q=>active.has(q.c)));idx=0}
function show(){
  const card=document.getElementById('card');
  const q=deck[idx];
  card.classList.remove('enter','exit-left','exit-right');
  void card.offsetWidth;
  card.classList.add('enter');
  document.getElementById('text').textContent='Я никогда не '+q.t;
  document.getElementById('cat').textContent=q.c;
  document.getElementById('counter').textContent=(idx+1)+' / '+deck.length;
}
function next(){
  if(!started){
    started=true;
    document.getElementById('bYes').style.display='';
    document.getElementById('bNo').style.display='';
    document.getElementById('bNext').style.display='none';
    deal();show();return;
  }
  deal();idx=0;sY=0;sN=0;
  document.getElementById('sYes').textContent=sY;
  document.getElementById('sNo').textContent=sN;
  show();
}
function answer(type){
  if(type==='yes')document.getElementById('sYes').textContent=++sY;
  else document.getElementById('sNo').textContent=++sN;
  const card=document.getElementById('card');
  card.classList.add(type==='yes'?'exit-left':'exit-right');
  setTimeout(()=>{
    idx++;
    if(idx>=deck.length){
      card.classList.remove('exit-left','exit-right');
      void card.offsetWidth;card.classList.add('enter');
      document.getElementById('text').textContent='Раунд окончен! Делал: '+sY+', Не делал: '+sN;
      document.getElementById('cat').textContent='';
      document.getElementById('counter').textContent='';
      document.getElementById('bYes').style.display='none';
      document.getElementById('bNo').style.display='none';
      document.getElementById('bNext').style.display='';
      document.getElementById('bNext').textContent='Ещё раунд →';
      return;
    }
    show();
  },300);
}
</script>
