services:
  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DB_PATH: /data/vpn_bot.db
    volumes:
      - ./data:/data
      - /var/log/radar-bots/vpn-bot:/var/log/radar-bots/vpn-bot
    network_mode: host

  landing:
    build:
      context: .
      dockerfile: landing/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DB_PATH: /data/vpn_bot.db
      BOT_USERNAME: radarshield_bot
    volumes:
      - ./data:/data
    network_mode: host

  captive-xray:
    image: teddysun/xray:latest
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./captive/xray_config.json:/etc/xray/config.json:ro
    command: ["xray", "-config", "/etc/xray/config.json"]
